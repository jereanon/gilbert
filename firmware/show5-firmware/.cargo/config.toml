# esp-hal track: bare-metal RISC-V, NO ESP-IDF underneath.
# Target is the upstream rv32imafc-unknown-none-elf — esp-hal uses
# regular bare-metal targets, no custom JSON spec or build-std needed
# (libcore + libcompiler_builtins ship for this triple).
[build]
target = "riscv32imafc-unknown-none-elf"

[target.riscv32imafc-unknown-none-elf]
# ``espflash`` provides the ESP32-P4 image format wrapper. ``--no-stub``
# is needed for this specific board — the flash-stub bounce trips,
# direct bootloader works fine. ``-p`` pins the port; adjust for your
# environment.
runner = "espflash flash --no-stub -p /dev/cu.wchusbserial10 --monitor"
# Linker scripts (``-Tlinkall.x`` etc.) are passed via build.rs so
# cargo emits them with the correct rerun-if-changed metadata. Don't
# duplicate them here.
rustflags = [
    # Workaround for an LLVM bug around the C extension on rv32imafc
    # described in the esp-hal docs. Without this, atomic intrinsics
    # don't link correctly.
    "-C", "force-frame-pointers",
]

[env]
ESP_LOG = "INFO"

[unstable]
build-std = ["core", "alloc"]
# Note: ``panic_immediate_abort`` is no longer a build-std-features
# value on recent nightlies (it became a panic strategy). The crate
# already sets ``panic = "abort"`` in [profile.*] so we don't need it.
