[toolchain]
# ESP32-P4 is RISC-V; stable Rust supports the underlying target but
# ``-Z build-std`` (needed to rebuild libstd against ESP-IDF's newlib)
# requires nightly. The vanilla esp-idf-template just tracks "nightly"
# without pinning a date — easier to keep moving, less likely to drift
# from the esp-rs project's tested combination.
channel = "nightly"
components = ["rust-src"]
