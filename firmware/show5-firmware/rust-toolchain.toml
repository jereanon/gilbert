[toolchain]
# esp-hal needs ``-Z build-std`` (rebuild core+alloc against our target
# memory model) which requires nightly. We track plain nightly — the
# esp-hal project tests against current nightly so this stays in sync
# with their CI.
channel = "nightly"
components = ["rust-src"]
targets = ["riscv32imafc-unknown-none-elf"]
